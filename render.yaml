services:
  - type: web
    name: smart-attendance-system
    env: python
    buildCommand: pip install cmake && pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: FLASK_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
      - key: DB_PATH
        value: database/attendance.db
